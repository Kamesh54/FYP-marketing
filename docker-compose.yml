version: '3.8'

services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.x-community
    container_name: agent_neo4j
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_server_memory_heap_initial_size=1G
      - NEO4J_server_memory_heap_max_size=2G
      - NEO4J_server_memory_pagecache_size=1G
      - NEO4J_dbms_logs_query_enabled=true
      - NEO4J_dbms_logs_query_threshold=0
    ports:
      - "7474:7474"    # HTTP port
      - "7687:7687"    # Bolt protocol port
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_conf:/var/lib/neo4j/conf
    networks:
      - agent_network
    healthcheck:
      test: ["CMD-SHELL", "neo4j status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Optional: Neo4j Bloom for visualization
  neo4j-bloom:
    image: neo4j:5.x-community
    container_name: agent_neo4j_bloom
    environment:
      - NEO4J_AUTH=neo4j/password123
    ports:
      - "7475:7474"    # Separate port for Bloom UI
    depends_on:
      - neo4j
    networks:
      - agent_network
    restart: unless-stopped

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_conf:
    driver: local

networks:
  agent_network:
    driver: bridge

# Usage:
# docker-compose up -d                 # Start services
# docker-compose down                  # Stop services
# docker-compose logs -f neo4j         # View logs
# docker-compose ps                    # Check status
#
# Access:
# Neo4j Browser: http://localhost:7474
# Credentials: neo4j / password123
# Connection: bolt://neo4j:7687
#
# For Windows (host.docker.internal):
# NEO4J_URI=bolt://host.docker.internal:7687
