<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Critic Agent Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3249;
      --accent: #6c63ff;
      --pass: #22c55e;
      --fail: #ef4444;
      --warn: #f59e0b;
      --text: #e2e8f0;
      --muted: #8892a4;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    header span.tag { background: var(--accent); color: #fff; font-size: .7rem;
      padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .refresh-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 7px 16px; border-radius: var(--radius); cursor: pointer; font-size: .85rem;
      transition: background .2s;
    }
    .refresh-btn:hover { background: var(--accent); border-color: var(--accent); }
    #last-updated { font-size: .75rem; color: var(--muted); }

    /* ── Summary cards ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      padding: 28px 32px 0;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 18px;
    }
    .card .label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .card .value { font-size: 2rem; font-weight: 700; }
    .card .value.pass-color  { color: var(--pass); }
    .card .value.fail-color  { color: var(--fail); }
    .card .value.accent-color { color: var(--accent); }

    /* ── Filters ── */
    .filters {
      padding: 22px 32px 0;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .filter-label { font-size: .8rem; color: var(--muted); }
    .filter-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      padding: 5px 14px; border-radius: 20px; cursor: pointer; font-size: .8rem; transition: all .2s;
    }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    .search-box {
      margin-left: auto;
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 7px 14px; border-radius: var(--radius); font-size: .85rem; width: 220px;
    }
    .search-box:focus { outline: none; border-color: var(--accent); }

    /* ── Table ── */
    .table-wrap { padding: 20px 32px 40px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    thead tr { border-bottom: 2px solid var(--border); }
    th { text-align: left; padding: 10px 14px; color: var(--muted); font-weight: 600;
         font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
      cursor: pointer;
    }
    tbody tr:hover { background: var(--surface); }
    td { padding: 12px 14px; vertical-align: middle; }

    /* ── Score bars ── */
    .score-cell { display: flex; flex-direction: column; gap: 4px; min-width: 130px; }
    .score-row { display: flex; align-items: center; gap: 6px; font-size: .75rem; }
    .score-row .score-label { color: var(--muted); width: 38px; flex-shrink: 0; }
    .bar-bg { flex: 1; height: 5px; background: var(--surface2); border-radius: 3px; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width .4s; }
    .bar-fill.intent  { background: #818cf8; }
    .bar-fill.brand   { background: #f472b6; }
    .bar-fill.quality { background: #34d399; }

    /* ── Overall score badge ── */
    .overall-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-weight: 700; font-size: 1rem;
    }

    /* ── Pass/Fail pill ── */
    .pill {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: .72rem; font-weight: 700; letter-spacing: .04em;
    }
    .pill.pass { background: rgba(34,197,94,.15); color: var(--pass); border: 1px solid rgba(34,197,94,.3); }
    .pill.fail { background: rgba(239,68,68,.15); color: var(--fail); border: 1px solid rgba(239,68,68,.3); }

    /* ── Decision pill ── */
    .decision-pill { padding: 3px 10px; border-radius: 20px; font-size: .72rem; font-weight: 700; display: inline-block; }
    .decision-pill.approved    { background: rgba(34,197,94,.15); color: var(--pass); }
    .decision-pill.rejected    { background: rgba(239,68,68,.15); color: var(--fail); }
    .decision-pill.regenerated { background: rgba(245,158,11,.15); color: var(--warn); }
    .decision-pill.pending     { background: var(--surface2); color: var(--muted); }

    /* ── Preview / detail panel ── */
    .detail-row td {
      padding: 0;
      background: var(--surface);
    }
    .detail-inner {
      padding: 18px 24px;
      border-left: 3px solid var(--accent);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .detail-section h4 { font-size: .75rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 8px; }
    .detail-section p  { font-size: .85rem; line-height: 1.6; color: var(--text); }
    .suggestions-list  { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .suggestions-list li {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 7px 12px; font-size: .82rem;
    }
    .suggestions-list li::before { content: "→ "; color: var(--accent); }
    .action-row { display: flex; gap: 8px; margin-top: 12px; }
    .action-btn {
      padding: 6px 16px; border-radius: 6px; border: 1px solid; cursor: pointer;
      font-size: .8rem; font-weight: 600; transition: opacity .2s;
    }
    .action-btn:hover { opacity: .8; }
    .action-btn.approve { background: rgba(34,197,94,.15); border-color: var(--pass); color: var(--pass); }
    .action-btn.reject  { background: rgba(239,68,68,.15);  border-color: var(--fail); color: var(--fail); }

    /* ── Empty / loading ── */
    .placeholder { text-align: center; padding: 60px 0; color: var(--muted); font-size: .9rem; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Content preview truncate ── */
    .content-preview { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--muted); }
    .brand-tag { font-weight: 600; color: var(--text); }
    .type-tag { font-size: .72rem; color: var(--muted); background: var(--surface2); padding: 2px 7px; border-radius: 4px; }
    .date-cell { color: var(--muted); font-size: .78rem; white-space: nowrap; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Critic Agent Dashboard <span class="tag">PORT 8007</span></h1>
  </div>
  <div class="header-right">
    <span id="last-updated"></span>
    <button class="refresh-btn" onclick="loadLogs()">↻ Refresh</button>
  </div>
</header>

<!-- Summary stats -->
<div class="summary-grid" id="summary-grid">
  <div class="card"><div class="label">Total Evaluated</div><div class="value accent-color" id="stat-total">—</div></div>
  <div class="card"><div class="label">Passed</div><div class="value pass-color" id="stat-pass">—</div></div>
  <div class="card"><div class="label">Failed</div><div class="value fail-color" id="stat-fail">—</div></div>
  <div class="card"><div class="label">Pass Rate</div><div class="value" id="stat-rate">—</div></div>
  <div class="card"><div class="label">Avg Intent</div><div class="value" id="stat-intent">—</div></div>
  <div class="card"><div class="label">Avg Brand</div><div class="value" id="stat-brand">—</div></div>
  <div class="card"><div class="label">Avg Quality</div><div class="value" id="stat-quality">—</div></div>
</div>

<!-- Filters -->
<div class="filters">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" data-filter="all"    onclick="setFilter('all',this)">All</button>
  <button class="filter-btn"        data-filter="pass"   onclick="setFilter('pass',this)">Passed</button>
  <button class="filter-btn"        data-filter="fail"   onclick="setFilter('fail',this)">Failed</button>
  <button class="filter-btn"        data-filter="pending" onclick="setFilter('pending',this)">Awaiting Decision</button>
  <input class="search-box" id="search-box" type="text" placeholder="Search brand or content…" oninput="renderTable()" />
</div>

<!-- Table -->
<div class="table-wrap">
  <div id="loading" class="placeholder"><span class="spinner"></span>Loading critic logs…</div>
  <table id="main-table" style="display:none">
    <thead>
      <tr>
        <th>#</th>
        <th>Brand</th>
        <th>Type</th>
        <th>Content Preview</th>
        <th>Scores</th>
        <th>Overall</th>
        <th>Status</th>
        <th>Decision</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
  <div id="empty" class="placeholder" style="display:none">No results match the current filter.</div>
</div>

<script>
const API = 'http://localhost:8007';
let allLogs = [];
let currentFilter = 'all';

async function loadLogs() {
  document.getElementById('loading').style.display = '';
  document.getElementById('main-table').style.display = 'none';
  document.getElementById('empty').style.display = 'none';

  try {
    const res = await fetch(`${API}/logs?limit=200`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allLogs = await res.json();
    updateStats();
    renderTable();
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<span style="color:#ef4444">⚠ Could not reach critic agent at ${API} — is it running?<br><small>${e}</small></span>`;
  }
}

function updateStats() {
  const n = allLogs.length;
  const passed = allLogs.filter(l => l.passed).length;
  const failed = n - passed;
  const avg = k => n ? (allLogs.reduce((s,l)=>s+l[k],0)/n).toFixed(2) : '—';

  document.getElementById('stat-total').textContent  = n;
  document.getElementById('stat-pass').textContent   = passed;
  document.getElementById('stat-fail').textContent   = failed;
  document.getElementById('stat-rate').textContent   = n ? Math.round(passed/n*100)+'%' : '—';
  document.getElementById('stat-intent').textContent  = avg('intent_score');
  document.getElementById('stat-brand').textContent   = avg('brand_score');
  document.getElementById('stat-quality').textContent = avg('quality_score');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function filtered() {
  const q = document.getElementById('search-box').value.toLowerCase();
  return allLogs.filter(l => {
    if (currentFilter === 'pass'    && !l.passed) return false;
    if (currentFilter === 'fail'    &&  l.passed) return false;
    if (currentFilter === 'pending' &&  l.user_decision) return false;
    if (q && !((l.brand_name||'').toLowerCase().includes(q) ||
               (l.content_type||'').toLowerCase().includes(q) ||
               (l.content_preview||'').toLowerCase().includes(q))) return false;
    return true;
  });
}

function bar(pct, cls) {
  return `<div class="bar-bg"><div class="bar-fill ${cls}" style="width:${Math.round(pct*100)}%"></div></div>`;
}

function scoreColor(v) {
  if (v >= 0.7) return 'var(--pass)';
  if (v >= 0.5) return 'var(--warn)';
  return 'var(--fail)';
}

function fmtDate(s) {
  if (!s) return '—';
  try { return new Date(s).toLocaleString(undefined,{dateStyle:'medium',timeStyle:'short'}); } catch{ return s; }
}

let openRow = null;

function renderTable() {
  const rows = filtered();
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  document.getElementById('loading').style.display = 'none';

  if (!rows.length) {
    document.getElementById('main-table').style.display = 'none';
    document.getElementById('empty').style.display = '';
    return;
  }
  document.getElementById('main-table').style.display = '';
  document.getElementById('empty').style.display = 'none';

  rows.forEach((l, i) => {
    const rowId = `row-${l.id}`;
    const decisionLabel = l.user_decision
      ? `<span class="decision-pill ${l.user_decision}">${l.user_decision}</span>`
      : `<span class="decision-pill pending">Pending</span>`;

    const tr = document.createElement('tr');
    tr.id = rowId;
    tr.onclick = () => toggleDetail(l, rowId);
    tr.innerHTML = `
      <td style="color:var(--muted);font-size:.75rem">${i+1}</td>
      <td><span class="brand-tag">${l.brand_name || '—'}</span></td>
      <td><span class="type-tag">${l.content_type || '—'}</span></td>
      <td><div class="content-preview">${escHtml(l.content_preview || '')}</div></td>
      <td>
        <div class="score-cell">
          <div class="score-row"><span class="score-label">Intent</span>${bar(l.intent_score,'intent')}<span style="font-size:.72rem;color:var(--muted)">${l.intent_score.toFixed(2)}</span></div>
          <div class="score-row"><span class="score-label">Brand</span>${bar(l.brand_score,'brand')}<span style="font-size:.72rem;color:var(--muted)">${l.brand_score.toFixed(2)}</span></div>
          <div class="score-row"><span class="score-label">Quality</span>${bar(l.quality_score,'quality')}<span style="font-size:.72rem;color:var(--muted)">${l.quality_score.toFixed(2)}</span></div>
        </div>
      </td>
      <td><span class="overall-badge" style="color:${scoreColor(l.overall_score)}">${l.overall_score.toFixed(3)}</span></td>
      <td><span class="pill ${l.passed ? 'pass':'fail'}">${l.passed ? 'PASS':'FAIL'}</span></td>
      <td>${decisionLabel}</td>
      <td class="date-cell">${fmtDate(l.created_at)}</td>
    `;
    tbody.appendChild(tr);
  });
}

function toggleDetail(l, rowId) {
  const detailId = `detail-${l.id}`;
  const existing = document.getElementById(detailId);
  if (existing) { existing.remove(); openRow = null; return; }

  // close any open
  if (openRow) {
    const prev = document.getElementById(`detail-${openRow}`);
    if (prev) prev.remove();
  }
  openRow = l.id;

  const refRow = document.getElementById(rowId);
  const detailTr = document.createElement('tr');
  detailTr.id = detailId;
  detailTr.className = 'detail-row';
  detailTr.innerHTML = `
    <td colspan="9">
      <div class="detail-inner">
        <div class="detail-section">
          <h4>Content Preview</h4>
          <p>${escHtml(l.content_preview || 'No preview available.')}</p>
          <div class="action-row">
            <button class="action-btn approve" onclick="recordDecision(event,'${l.content_id}','approved','${detailId}')">✓ Approve</button>
            <button class="action-btn reject"  onclick="recordDecision(event,'${l.content_id}','rejected','${detailId}')">✗ Reject</button>
          </div>
        </div>
        <div class="detail-section">
          <h4>Critique</h4>
          <p>${escHtml(l.critique_text || '—')}</p>
          <br/>
          <h4>Improvement Suggestions</h4>
          <ul class="suggestions-list" id="sugg-${l.id}">
            <li style="color:var(--muted)">Loading…</li>
          </ul>
        </div>
      </div>
    </td>
  `;
  refRow.insertAdjacentElement('afterend', detailTr);
  loadSuggestions(l.content_id, l.id);
}

async function loadSuggestions(contentId, logId) {
  const ul = document.getElementById(`sugg-${logId}`);
  try {
    const res = await fetch(`${API}/log/${contentId}`);
    const data = await res.json();
    // suggestions aren't stored in DB — reconstruct from critique or just show placeholder
    ul.innerHTML = `<li style="color:var(--muted)">Suggestions are part of the full critique above.</li>`;
  } catch(e) {
    ul.innerHTML = `<li style="color:var(--fail)">Could not load.</li>`;
  }
}

async function recordDecision(e, contentId, decision, detailId) {
  e.stopPropagation();
  try {
    const res = await fetch(`${API}/decision/${contentId}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({decision})
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    // Update in allLogs
    const log = allLogs.find(l => l.content_id === contentId);
    if (log) log.user_decision = decision;
    document.getElementById(detailId)?.remove();
    openRow = null;
    renderTable();
  } catch(e) {
    alert('Failed to record decision: ' + e);
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Auto-refresh every 30 seconds
setInterval(loadLogs, 30000);
loadLogs();
</script>
</body>
</html>
