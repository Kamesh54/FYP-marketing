<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Assistant</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f8;
            --bg-sidebar: #202123;
            --text-primary: #343541;
            --text-secondary: #565869;
            --text-inverse: #ececf1;
            --border-color: #d9d9e3;
            --hover-bg: #f7f7f8;
            --accent-color: #10a37f;
            --accent-hover: #0d8a6b;
            --danger-color: #ef4444;
            --user-message-bg: #10a37f;
            --assistant-message-bg: #f7f7f8;
            --sidebar-width: 260px;
        }

        [data-theme="dark"] {
            --bg-primary: #343541;
            --bg-secondary: #444654;
            --bg-sidebar: #202123;
            --text-primary: #ececf1;
            --text-secondary: #c5c5d2;
            --text-inverse: #ffffff;
            --border-color: #565869;
            --hover-bg: #2a2b32;
            --assistant-message-bg: #444654;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 100;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .sidebar-header {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 16px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-inverse);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .session-item {
            padding: 12px;
            margin: 4px 0;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-inverse);
            font-size: 14px;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .session-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .session-item.active {
            background: rgba(255,255,255,0.15);
        }

        .session-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-delete {
            opacity: 0;
            background: var(--danger-color);
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .session-item:hover .session-delete {
            opacity: 1;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: var(--text-inverse);
            font-size: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-inverse);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 8px;
            width: 100%;
        }

        /* Main Area */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .top-bar {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-primary);
        }

        .toggle-sidebar-btn, .theme-toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 8px;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .toggle-sidebar-btn:hover, .theme-toggle-btn:hover {
            background: var(--hover-bg);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 16px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .message.user {
            background: var(--user-message-bg);
            padding: 16px;
            border-radius: 12px;
            color: white;
        }

        .message.assistant {
            background: var(--assistant-message-bg);
            padding: 16px;
            border-radius: 12px;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .message.user .message-avatar {
            background: #5436da;
            color: white;
        }

        .message.assistant .message-avatar {
            background: var(--accent-color);
            color: white;
        }

        .message-content {
            flex: 1;
            line-height: 1.6;
        }

        .message-timestamp {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message:hover .message-timestamp {
            opacity: 1;
        }

        .content-preview-card {
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
            background: var(--bg-primary);
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .preview-title {
            font-weight: 600;
            font-size: 16px;
        }

        .preview-type-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .preview-type-badge.blog {
            background: #dbeafe;
            color: #1e40af;
        }

        .preview-type-badge.post {
            background: #fce7f3;
            color: #9f1239;
        }

        .preview-iframe {
            width: 100%;
            height: 400px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin: 12px 0;
        }

        .preview-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .preview-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preview-btn.approve {
            background: var(--accent-color);
            color: white;
        }

        .preview-btn.approve:hover {
            background: var(--accent-hover);
        }

        .preview-btn.regenerate {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .preview-btn.regenerate:hover {
            background: var(--hover-bg);
        }

        .preview-btn.reject {
            background: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        .preview-btn.reject:hover {
            background: var(--danger-color);
            color: white;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-primary);
        }

        .input-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            max-height: 200px;
            font-family: inherit;
        }

        .message-input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .send-btn {
            padding: 12px 20px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .cost-estimate {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .empty-state-suggestions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .suggestion-btn {
            padding: 12px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            color: var(--text-primary);
        }

        .suggestion-btn:hover {
            background: var(--hover-bg);
            border-color: var(--accent-color);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                height: 100%;
                z-index: 1000;
            }

            .sidebar.collapsed {
                transform: translateX(-100%);
            }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
                </svg>
                New Chat
            </button>
        </div>

        <div class="sessions-list" id="sessionsList">
            <!-- Sessions will be loaded here -->
        </div>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">U</div>
                <div>
                    <div id="userEmail" style="font-size: 13px;"></div>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <div class="main-area">
        <div class="top-bar">
            <button class="toggle-sidebar-btn" id="toggleSidebarBtn">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/>
                </svg>
            </button>

            <button class="theme-toggle-btn" id="themeToggleBtn">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/>
                </svg>
            </button>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <h2>How can I help you today?</h2>
                <p>Start a conversation or try one of these:</p>
                <div class="empty-state-suggestions">
                    <button class="suggestion-btn" data-suggestion="Analyze my website's SEO">🔍 Analyze SEO</button>
                    <button class="suggestion-btn" data-suggestion="Write a blog post about AI trends">✍️ Generate Blog</button>
                    <button class="suggestion-btn" data-suggestion="Create a social media post">📱 Social Post</button>
                    <button class="suggestion-btn" data-suggestion="Show my analytics">📊 View Metrics</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <textarea 
                    id="messageInput" 
                    class="message-input" 
                    placeholder="Message AI Assistant..." 
                    rows="1"
                ></textarea>
                <button id="sendBtn" class="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script src="formatter.js"></script>
    <script>
        const API_BASE_URL = "http://127.0.0.1:8004";
        let currentSessionId = null;
        let currentUser = null;
        let isLoading = false;

        // Check authentication
        async function checkAuth() {
            const token = localStorage.getItem("authToken");
            if (!token) {
                window.location.href = "login.html";
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/auth/me`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });

                if (response.status === 401) {
                    localStorage.removeItem("authToken");
                    window.location.href = "login.html";
                    return;
                }

                currentUser = await response.json();
                document.getElementById("userEmail").textContent = currentUser.email;
                document.getElementById("userAvatar").textContent = currentUser.email[0].toUpperCase();

                // Load sessions
                await loadSessions();
            } catch (error) {
                console.error("Auth check failed:", error);
                window.location.href = "login.html";
            }
        }

        // Load sessions
        async function loadSessions() {
            try {
                const token = localStorage.getItem("authToken");
                const response = await fetch(`${API_BASE_URL}/sessions`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });

                const data = await response.json();
                const sessionsList = document.getElementById("sessionsList");
                
                if (data.sessions.length === 0) {
                    sessionsList.innerHTML = '<div style="padding: 12px; color: rgba(255,255,255,0.5); font-size: 13px;">No conversations yet</div>';
                    return;
                }

                sessionsList.innerHTML = data.sessions.map(session => `
                    <div class="session-item ${session.id === currentSessionId ? 'active' : ''}" data-session-id="${session.id}">
                        <span class="session-title">${session.title}</span>
                        <button class="session-delete" onclick="deleteSession('${session.id}', event)">Delete</button>
                    </div>
                `).join('');

                // Add click handlers
                document.querySelectorAll('.session-item').forEach(item => {
                    item.addEventListener('click', () => loadSession(item.dataset.sessionId));
                });
            } catch (error) {
                console.error("Failed to load sessions:", error);
            }
        }

        // Create new session
        async function createNewSession() {
            try {
                const token = localStorage.getItem("authToken");
                const response = await fetch(`${API_BASE_URL}/sessions/new`, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${token}` }
                });

                const data = await response.json();
                currentSessionId = data.session_id;
                
                // Clear chat
                document.getElementById("chatContainer").innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <h2>How can I help you today?</h2>
                    </div>
                `;

                await loadSessions();
            } catch (error) {
                console.error("Failed to create session:", error);
            }
        }

        // Load session messages
        async function loadSession(sessionId) {
            try {
                const token = localStorage.getItem("authToken");
                const response = await fetch(`${API_BASE_URL}/sessions/${sessionId}/messages`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });

                const data = await response.json();
                currentSessionId = sessionId;
                
                const chatContainer = document.getElementById("chatContainer");
                chatContainer.innerHTML = '';

                data.messages.forEach(msg => {
                    appendMessage(msg.role, msg.content, false);
                });

                await loadSessions(); // Refresh session list to update active state
            } catch (error) {
                console.error("Failed to load session:", error);
            }
        }

        // Delete session
        async function deleteSession(sessionId, event) {
            event.stopPropagation();
            
            if (!confirm("Delete this conversation?")) return;

            try {
                const token = localStorage.getItem("authToken");
                await fetch(`${API_BASE_URL}/sessions/${sessionId}`, {
                    method: "DELETE",
                    headers: { "Authorization": `Bearer ${token}` }
                });

                if (sessionId === currentSessionId) {
                    currentSessionId = null;
                    document.getElementById("chatContainer").innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">💬</div>
                            <h2>How can I help you today?</h2>
                        </div>
                    `;
                }

                await loadSessions();
            } catch (error) {
                console.error("Failed to delete session:", error);
            }
        }

        // Append message to chat
        function appendMessage(role, content, animate = true) {
            const chatContainer = document.getElementById("chatContainer");
            
            // Remove empty state
            const emptyState = chatContainer.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? 'U' : 'AI';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            // Format message if assistant
            if (role === 'assistant') {
                contentDiv.innerHTML = messageFormatter.format(content);
            } else {
                contentDiv.textContent = content;
            }
            
            const timestamp = document.createElement('div');
            timestamp.className = 'message-timestamp';
            timestamp.textContent = new Date().toLocaleTimeString();
            
            messageDiv.appendChild(avatar);
            contentDiv.appendChild(timestamp);
            messageDiv.appendChild(contentDiv);
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Show typing indicator
        function showTyping() {
            const chatContainer = document.getElementById("chatContainer");
            const typing = document.createElement('div');
            typing.id = 'typingIndicator';
            typing.className = 'message assistant';
            typing.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            chatContainer.appendChild(typing);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        // Show content preview
        async function showContentPreview(contentId, type) {
            const chatContainer = document.getElementById("chatContainer");
            const previewDiv = document.createElement('div');
            previewDiv.className = 'message assistant';
            
            let previewContent = '';
            
            if (type === 'blog') {
                previewContent = `<iframe class="preview-iframe" src="${API_BASE_URL}/preview/blog/${contentId}"></iframe>`;
            } else if (type === 'post') {
                // Fetch the content details to get image path
                try {
                    const token = localStorage.getItem("authToken");
                    const response = await fetch(`${API_BASE_URL}/content/${contentId}/details`, {
                        headers: { "Authorization": `Bearer ${token}` }
                    });
                    
                    if (response.ok) {
                        const content = await response.json();
                        const imagePath = content.preview_url || content.metadata?.image_path;
                        
                        previewContent = `
                            <div style="padding: 20px; background: var(--bg-secondary); border-radius: 8px;">
                                ${imagePath ? `
                                    <img src="${API_BASE_URL}/preview/image/${encodeURIComponent(imagePath)}" 
                                         style="width: 100%; max-width: 500px; border-radius: 8px; margin-bottom: 16px;"
                                         alt="Generated social media image"
                                         onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                    <div style="display: none; padding: 40px; text-align: center; color: var(--text-secondary);">
                                        📷 Image preview not available
                                    </div>
                                ` : `
                                    <div style="padding: 40px; text-align: center; color: var(--text-secondary);">
                                        📷 Image will be generated on approval
                                    </div>
                                `}
                                <div style="margin-top: 12px; padding: 12px; background: var(--bg-primary); border-radius: 6px;">
                                    <strong>Post Text:</strong>
                                    <p style="margin-top: 8px;">${content.content}</p>
                                </div>
                            </div>
                        `;
                    } else {
                        previewContent = `
                            <div style="padding: 20px; background: var(--bg-secondary); border-radius: 8px;">
                                <p style="text-align: center; color: var(--text-secondary);">Preview loading...</p>
                            </div>
                        `;
                    }
                } catch (error) {
                    console.error("Preview fetch error:", error);
                    previewContent = `
                        <div style="padding: 20px; background: var(--bg-secondary); border-radius: 8px;">
                            <p style="text-align: center; color: var(--text-secondary);">📷 Preview will be available on approval</p>
                        </div>
                    `;
                }
            }
            
            previewDiv.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="message-content">
                    <div class="content-preview-card">
                        <div class="preview-header">
                            <div class="preview-title">Content Preview</div>
                            <div class="preview-type-badge ${type}">${type}</div>
                        </div>
                        ${previewContent}
                        <div class="preview-actions">
                            <button class="preview-btn approve" onclick="approveContent('${contentId}')">
                                ✓ Approve & Publish
                            </button>
                            <button class="preview-btn regenerate" onclick="regenerateContent('${contentId}')">
                                ↻ Regenerate
                            </button>
                            <button class="preview-btn reject" onclick="rejectContent('${contentId}')">
                                ✕ Cancel
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            chatContainer.appendChild(previewDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Approve content
        async function approveContent(contentId) {
            try {
                const token = localStorage.getItem("authToken");
                const response = await fetch(`${API_BASE_URL}/content/${contentId}/approve`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ approved: true })
                });

                const data = await response.json();
                appendMessage('assistant', `✅ Content published successfully!\n\n${data.url ? `View at: ${data.url}` : ''}`);
            } catch (error) {
                console.error("Approval error:", error);
                appendMessage('assistant', '⚠️ Failed to publish content. Please try again.');
            }
        }

        // Reject content
        async function rejectContent(contentId) {
            try {
                const token = localStorage.getItem("authToken");
                await fetch(`${API_BASE_URL}/content/${contentId}/approve`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ approved: false })
                });

                appendMessage('assistant', 'Content cancelled.');
            } catch (error) {
                console.error("Reject error:", error);
            }
        }

        // Regenerate content
        function regenerateContent(contentId) {
            appendMessage('assistant', 'Regenerating content... (This feature will be implemented)');
        }

        // Send message
        async function sendMessage(message) {
            if (!message.trim() || isLoading) return;

            appendMessage('user', message);
            document.getElementById('messageInput').value = '';
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            
            showTyping();

            try {
                const token = localStorage.getItem("authToken");
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: currentSessionId,
                        message: message
                    })
                });

                const data = await response.json();
                
                hideTyping();
                appendMessage('assistant', data.response);

                // Update current session ID if new
                if (data.session_id !== currentSessionId) {
                    currentSessionId = data.session_id;
                    await loadSessions();
                }

                // Show content preview if available
                if (data.content_preview_id) {
                    const type = data.intent === 'blog_generation' ? 'blog' : 'post';
                    showContentPreview(data.content_preview_id, type);
                }

                // Show cost if available
                if (data.workflow_cost) {
                    appendMessage('assistant', `\n💰 Estimated cost: ${data.workflow_cost.cost_usd} (~${data.workflow_cost.total_time}s)`);
                }

            } catch (error) {
                hideTyping();
                console.error("Send message error:", error);
                appendMessage('assistant', '⚠️ Something went wrong. Please try again.');
            } finally {
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        // Event listeners
        document.getElementById('newChatBtn').addEventListener('click', createNewSession);
        document.getElementById('sendBtn').addEventListener('click', () => {
            const input = document.getElementById('messageInput');
            sendMessage(input.value);
        });

        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const input = document.getElementById('messageInput');
                sendMessage(input.value);
            }
        });

        document.getElementById('toggleSidebarBtn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('collapsed');
        });

        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('authToken');
            localStorage.removeItem('userId');
            localStorage.removeItem('userEmail');
            window.location.href = 'login.html';
        });

        // Suggestion buttons
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('suggestion-btn')) {
                const suggestion = e.target.dataset.suggestion;
                document.getElementById('messageInput').value = suggestion;
                sendMessage(suggestion);
            }
        });

        // Auto-resize textarea
        const textarea = document.getElementById('messageInput');
        textarea.addEventListener('input', () => {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        });

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // Initialize
        checkAuth();
    </script>
</body>
</html>
