<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI SEO & Content Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 8px;
        }

        .logo p {
            color: #6b7280;
            font-size: 14px;
        }

        .tab-switcher {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f3f4f6;
            color: #6b7280;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-button.active {
            background: #667eea;
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .password-strength.show {
            display: block;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }

        .password-strength-bar.weak {
            width: 33%;
            background: #ef4444;
        }

        .password-strength-bar.medium {
            width: 66%;
            background: #f59e0b;
        }

        .password-strength-bar.strong {
            width: 100%;
            background: #10b981;
        }

        .password-hint {
            margin-top: 4px;
            font-size: 12px;
            color: #6b7280;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            cursor: pointer;
        }

        .checkbox-group label {
            color: #374151;
            font-size: 14px;
            cursor: pointer;
        }

        .submit-button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-button:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .submit-button:active {
            transform: translateY(0);
        }

        .submit-button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .success-message {
            background: #d1fae5;
            color: #059669;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>AI Content Assistant</h1>
            <p>SEO optimization & content generation platform</p>
        </div>

        <div class="tab-switcher">
            <button class="tab-button active" id="login-tab">Login</button>
            <button class="tab-button" id="signup-tab">Sign Up</button>
        </div>

        <div class="error-message" id="error-message"></div>
        <div class="success-message" id="success-message"></div>

        <!-- Login Form -->
        <form id="login-form">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Enter your password" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="remember-me">
                <label for="remember-me">Remember me</label>
            </div>

            <button type="submit" class="submit-button" id="login-button">
                Login
            </button>
        </form>

        <!-- Signup Form -->
        <form id="signup-form" class="hidden">
            <div class="form-group">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" placeholder="Create a strong password" required>
                <div class="password-strength" id="password-strength">
                    <div class="password-strength-bar" id="password-strength-bar"></div>
                </div>
                <div class="password-hint">
                    Must be 8+ characters with uppercase, lowercase, and number
                </div>
            </div>

            <div class="form-group">
                <label for="signup-password-confirm">Confirm Password</label>
                <input type="password" id="signup-password-confirm" placeholder="Re-enter your password" required>
            </div>

            <button type="submit" class="submit-button" id="signup-button">
                Create Account
            </button>
        </form>
    </div>

    <script>
        const API_BASE_URL = "http://127.0.0.1:8004";

        // Tab switching
        const loginTab = document.getElementById("login-tab");
        const signupTab = document.getElementById("signup-tab");
        const loginForm = document.getElementById("login-form");
        const signupForm = document.getElementById("signup-form");
        const errorMessage = document.getElementById("error-message");
        const successMessage = document.getElementById("success-message");

        loginTab.addEventListener("click", () => {
            loginTab.classList.add("active");
            signupTab.classList.remove("active");
            loginForm.classList.remove("hidden");
            signupForm.classList.add("hidden");
            clearMessages();
        });

        signupTab.addEventListener("click", () => {
            signupTab.classList.add("active");
            loginTab.classList.remove("active");
            signupForm.classList.remove("hidden");
            loginForm.classList.add("hidden");
            clearMessages();
        });

        // Password strength checker
        const signupPasswordInput = document.getElementById("signup-password");
        const passwordStrength = document.getElementById("password-strength");
        const passwordStrengthBar = document.getElementById("password-strength-bar");

        signupPasswordInput.addEventListener("input", (e) => {
            const password = e.target.value;
            if (password.length === 0) {
                passwordStrength.classList.remove("show");
                return;
            }

            passwordStrength.classList.add("show");
            
            // Calculate strength
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            // Update bar
            passwordStrengthBar.className = "password-strength-bar";
            if (strength <= 2) {
                passwordStrengthBar.classList.add("weak");
            } else if (strength <= 3) {
                passwordStrengthBar.classList.add("medium");
            } else {
                passwordStrengthBar.classList.add("strong");
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add("show");
            successMessage.classList.remove("show");
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add("show");
            errorMessage.classList.remove("show");
        }

        function clearMessages() {
            errorMessage.classList.remove("show");
            successMessage.classList.remove("show");
        }

        function setButtonLoading(button, loading) {
            if (loading) {
                button.disabled = true;
                button.innerHTML += '<span class="loading-spinner"></span>';
            } else {
                button.disabled = false;
                const spinner = button.querySelector(".loading-spinner");
                if (spinner) spinner.remove();
            }
        }

        // Login form submission
        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            clearMessages();

            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-password").value;
            const rememberMe = document.getElementById("remember-me").checked;
            const loginButton = document.getElementById("login-button");

            setButtonLoading(loginButton, true);

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || "Login failed");
                }

                // Save token
                localStorage.setItem("authToken", data.token);
                localStorage.setItem("userId", data.user_id);
                localStorage.setItem("userEmail", data.email);
                
                if (rememberMe) {
                    localStorage.setItem("rememberMe", "true");
                }

                showSuccess("Login successful! Redirecting...");

                // Redirect to agent page
                setTimeout(() => {
                    window.location.href = "agent.html";
                }, 1000);

            } catch (error) {
                showError(error.message);
                setButtonLoading(loginButton, false);
                loginButton.textContent = "Login";
            }
        });

        // Signup form submission
        signupForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            clearMessages();

            const email = document.getElementById("signup-email").value;
            const password = document.getElementById("signup-password").value;
            const confirmPassword = document.getElementById("signup-password-confirm").value;
            const signupButton = document.getElementById("signup-button");

            // Validate passwords match
            if (password !== confirmPassword) {
                showError("Passwords do not match");
                return;
            }

            // Validate password strength
            if (password.length < 8) {
                showError("Password must be at least 8 characters");
                return;
            }

            if (!/[a-z]/.test(password) || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
                showError("Password must contain uppercase, lowercase, and number");
                return;
            }

            setButtonLoading(signupButton, true);

            try {
                const response = await fetch(`${API_BASE_URL}/auth/signup`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || "Signup failed");
                }

                // Auto-login after signup
                localStorage.setItem("authToken", data.token);
                localStorage.setItem("userId", data.user_id);
                localStorage.setItem("userEmail", data.email);

                showSuccess("Account created! Redirecting...");

                // Redirect to agent page
                setTimeout(() => {
                    window.location.href = "agent.html";
                }, 1000);

            } catch (error) {
                showError(error.message);
                setButtonLoading(signupButton, false);
                signupButton.textContent = "Create Account";
            }
        });

        // Check if already logged in
        if (localStorage.getItem("authToken")) {
            window.location.href = "agent.html";
        }
    </script>
</body>
</html>
